# =============================================================================
# config.yaml — single source of truth for the Kalshi weather research system.
#
# No values are hardcoded in code; everything tunable lives here.
# This file is committed to git (it holds no secrets).
# =============================================================================

# -----------------------------------------------------------------------------
# stations: the weather stations we forecast & trade.
#
# RESOLUTION VERIFIED (Phase 2, 2026-05-21): `resolution_station` /
# `resolution_notes` were filled in by reading each city's live Kalshi contract
# `settlement_sources`. Kalshi settles every temperature market on the NWS
# Climatological Report (Daily) — the "CLI" product — for the named station.
# Each `id` below is the NWS CLI station code (K + the Kalshi `issuedby` code),
# and the lat/lon point at that exact station so GEFS samples the right place.
#
# `kalshi_series` (Phase 4) is the active Kalshi high-temp series we log.
# Re-verify any time with: python scripts/fetch_kalshi_rules.py
#                          python scripts/discover_kalshi_series.py
# -----------------------------------------------------------------------------
stations:
