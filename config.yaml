    name: Atlanta
    kalshi_city: Atlanta
    kalshi_series: KXHIGHTATL
    latitude: 33.6367
    longitude: -84.4281
    timezone: America/New_York
    resolution_station: Atlanta Intl Airport (NWS CLI station KATL)
    resolution_notes: "NWS CLI (Daily) max temp, whole degF; CLI day = local midnight-midnight (1AM-1AM during DST). Kalshi settlement_sources issuedby=ATL, WFO FFC."

