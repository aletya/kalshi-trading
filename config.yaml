# -----------------------------------------------------------------------------
# gefs: NOAA GEFS ensemble ingestion (Phase 1).
# -----------------------------------------------------------------------------
gefs:
  s3_bucket: noaa-gefs-pds        # NOAA Open Data bucket (anonymous access)
  model_runs: ["00", "06", "12", "18"]   # forecast cycles (UTC) to pull
  members: 31                     # ensemble size (1 control + 30 perturbed)
  # Lead times (hours) to extract. Expanded by the config loader into a
  # 3-hourly sequence: 3, 6, 9, ... 168 (7 days). A daily HIGH is the max temp
  # across the local day, so we need the full sub-daily trace per member, not
  # one snapshot. (A plain list is also accepted here.)
  forecast_hours:
    start: 3
    stop: 168
    step: 3
  variable: "2t"                  # 2-metre temperature

# -----------------------------------------------------------------------------
# kalshi: Kalshi market ingestion (Phase 4).
# -----------------------------------------------------------------------------
kalshi:
  api_base: "https://api.elections.kalshi.com/trade-api/v2"
  market_series: []               # temperature market series tickers to track
  poll_interval_minutes: 15       # order-book snapshot cadence

# -----------------------------------------------------------------------------
# strategy: trade-selection thresholds (Phases 5 & 7).
# -----------------------------------------------------------------------------
strategy:
  min_edge: 0.05                  # min (our prob - market price) to consider a trade
  max_position_per_market: 100    # paper-trading sizing cap (contracts)
  require_edge_exceeds_spread: true  # never count an "edge" smaller than the spread

# -----------------------------------------------------------------------------
# paths: local storage locations (relative to repo root).
# -----------------------------------------------------------------------------
paths:
  data_dir: "data"
  ensemble_dir: "data/ensemble"
  observations_dir: "data/observations"
  database: "data/kalshi.db"
