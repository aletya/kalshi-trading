# =============================================================================
# config.yaml — single source of truth for the Kalshi weather research system.
#
# No values are hardcoded in code; everything tunable lives here.
# This file is committed to git (it holds no secrets).
# =============================================================================

# -----------------------------------------------------------------------------
# stations: the weather stations we forecast & trade.
#
# IMPORTANT: `id`, `latitude`, `longitude` below are best-known PLACEHOLDERS for
# each city's primary airport/observation site. They are good enough to extract
# a nearest GEFS grid point in Phase 1, but they are NOT yet confirmed against
# Kalshi's contract resolution rules.
#
# `resolution_station` and `resolution_notes` are intentionally BLANK. They are
# filled in and verified in Phase 2 by reading Kalshi's actual settlement rules
# (which exact NWS station, observation window, rounding, day-cutoff). Resolution
# mismatch is the #1 source of fake edges — do not assume, verify.
# -----------------------------------------------------------------------------
